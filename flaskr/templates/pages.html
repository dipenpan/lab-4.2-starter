{% extends "main.html" %}

{% block page_name %}
Wiki Pages
{% endblock %}

{% block content %}
<div class="page-card">
    <h3>Pages contained in this Wiki</h3>
    <ul class="page-list">
        {% for page in all_pages %}
        <li>
            <a class="page-link" href="{{ url_for('pages', name=page) }}">
                {{ page }}
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
